    const dimColors = { capacity: '#10b981', market: '#f59e0b', action: '#6366f1', decision: '#ec4899' };
    const dimNames = { capacity: '产能底气', market: '市场嗅觉', action: '行动惯性', decision: '决策算账' };

    function renderResult(type) {
      const p = profiles[type];
      
      document.getElementById('emoji').textContent = p.emoji;
      document.getElementById('typeLetter').textContent = p.type + '型';
      document.getElementById('title').textContent = p.title;
      document.getElementById('tag').textContent = p.tag;
      document.getElementById('summary').textContent = p.summary;
      // Weakness & Opportunity
      document.getElementById('weakness').innerHTML = p.weakness.split('\n').map(s => s.trim() ? `<div>• ${s}</div>` : '').join('');
      document.getElementById('opportunity').innerHTML = p.opportunity.split('\n').map(s => s.trim() ? `<div>• ${s}</div>` : '').join('');
      // Reminder
      document.getElementById('reminder').innerHTML = p.reminder.split('\n').map(s => s.trim() ? `<div>• ${s}</div>` : '').join('');
      document.getElementById('advice').textContent = p.advice;
      
      // Dimensions
      const dimsHtml = Object.entries(p.dimensions).map(([key, value]) => `
        <div class="dim-item">
          <div class="dim-label">${dimNames[key]}</div>
          <div class="dim-bar"><div class="dim-fill" style="width:${value}%;background:${dimColors[key]}"></div></div>
          <div class="dim-value" style="color:${dimColors[key]}">${value}</div>
        </div>
      `).join('');
      document.getElementById('dimensions').innerHTML = dimsHtml;
      
      // Strengths
      document.getElementById('strengths').innerHTML = p.strengths.map(s => `<div>• ${s}</div>`).join('');
      
      // Actions
      document.getElementById('actions').innerHTML = p.actions.map((a, i) => `
        <li><span class="action-num">${i + 1}</span><span class="action-text">${a}</span></li>
      `).join('');
      
      // Update nav buttons
      document.querySelectorAll('.type-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.type === type);
      });
    }

    // Create nav buttons
    const navHtml = Object.keys(profiles).map(type => 
      `<button class="type-btn${type === 'A' ? ' active' : ''}" data-type="${type}" onclick="renderResult('${type}')">${profiles[type].emoji} ${type}</button>`
    ).join('');
    document.getElementById('typeNav').innerHTML = navHtml;
    
    // Render first profile
    renderResult('A');
  </script>
